name: Build iOS 9 Jailbreak App (.app)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 14   # Important for old Cordova

      - name: Install Legacy Cordova
        run: |
          npm install -g cordova@8

      - name: Create iOS Project (iOS 9 Compatible)
        run: |
          set -e

          cordova create promo com.piseyshop.promo PromoApp

          rm -rf promo/www/*
          cp -r www/* promo/www/

          cd promo

          # Add old iOS platform (supports iOS 9)
          cordova platform add ios@4.5.5

          # Force deployment target to iOS 9
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 9.0;/g' platforms/ios/CordovaLib/CordovaLib.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 9.0;/g' platforms/ios/PromoApp.xcodeproj/project.pbxproj

          # Build for device (no signing needed for .app extraction)
          cordova build ios --device

      - name: Locate .app
        run: |
          APP_PATH=$(find promo/platforms/ios -name "*.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app found. Build failed."
            exit 1
          fi

          echo "✅ Found app at: $APP_PATH"

          cp -r "$APP_PATH" PromoApp.app

      - name: Zip App for Download
        run: |
          zip -r PromoApp-iOS9.zip PromoApp.app

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: PromoApp-iOS9
          path: PromoApp-iOS9.zip
