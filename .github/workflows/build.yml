name: Build iOS 9 Jailbreak App (.app)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-12   # ✅ FIXED

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 14

      - name: Install Cordova 8
        run: npm install -g cordova@8

      - name: Create iOS Project
        run: |
          set -e

          cordova create promo com.piseyshop.promo PromoApp

          rm -rf promo/www/*
          cp -r www/* promo/www/

          cd promo

          cordova platform add ios@4.5.5

          # Force iOS 9 support
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 9.0;/g' platforms/ios/CordovaLib/CordovaLib.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 9.0;/g' platforms/ios/PromoApp.xcodeproj/project.pbxproj

          cordova build ios --device

      - name: Extract .app
        run: |
          APP_PATH=$(find promo/platforms/ios -name "*.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app found"
            exit 1
          fi

          cp -r "$APP_PATH" PromoApp.app

      - name: Zip App
        run: zip -r PromoApp-iOS9.zip PromoApp.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PromoApp-iOS9
          path: PromoApp-iOS9.zip
